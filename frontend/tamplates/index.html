<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FeedForge — RSS Feed Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161a22; --surface2: #1e2330; --border: #2a3040;
      --orange: #f26522; --orange-hover: #ff7b35; --orange-glow: rgba(242,101,34,0.25);
      --text: #e8eaf0; --muted: #7a8299; --green: #3dd68c; --red: #ff5c5c; --blue: #4a9eff;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh;
      background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(242,101,34,0.08) 0%, transparent 60%); }
    header { padding: 16px 40px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
      background: rgba(13,15,20,0.92); backdrop-filter: blur(12px); }
    .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
    .logo span { color: var(--orange); }
    .header-badge { font-size: 12px; background: var(--surface2); border: 1px solid var(--border);
      padding: 4px 12px; border-radius: 20px; color: var(--muted); }

    .layout { display: flex; min-height: calc(100vh - 57px); }

    /* Sidebar */
    .sidebar { width: 260px; flex-shrink: 0; border-right: 1px solid var(--border);
      padding: 20px 12px; overflow-y: auto; height: calc(100vh - 57px); position: sticky; top: 57px; }
    .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); padding: 0 10px; margin-bottom: 8px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px;
      cursor: pointer; transition: background 0.15s; border: 1px solid transparent; }
    .nav-item:hover { background: var(--surface); }
    .nav-item.active { background: var(--surface); border-color: rgba(242,101,34,0.3); }
    .nav-icon { width: 30px; height: 30px; border-radius: 7px; background: var(--surface2);
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      flex-shrink: 0; border: 1px solid var(--border); }
    .nav-info { flex: 1; min-width: 0; }
    .nav-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-count { font-size: 11px; color: var(--muted); }
    .nav-del { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px 5px;
      border-radius: 4px; font-size: 13px; opacity: 0; transition: opacity 0.15s, color 0.15s; }
    .nav-item:hover .nav-del { opacity: 1; }
    .nav-del:hover { color: var(--red); }
    .sidebar-empty { text-align: center; padding: 30px 12px; color: var(--muted); font-size: 13px; }

    /* Content */
    .content { flex: 1; padding: 28px 36px; max-width: 820px; overflow-y: auto; }

    /* Generator Card */
    .gen-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
      padding: 24px 28px; margin-bottom: 32px; position: relative; overflow: hidden; }
    .gen-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent); }
    .hero-mini { margin-bottom: 18px; }
    .hero-mini h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px; margin-bottom: 4px; }
    .hero-mini h1 em { color: var(--orange); font-style: normal; }
    .hero-mini p { font-size: 13px; color: var(--muted); }

    .input-row { display: flex; gap: 10px; }
    .input-wrap { flex: 1; position: relative; }
    .input-wrap input { width: 100%; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 11px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
      padding: 13px 110px 13px 46px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-glow); }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .input-hint { position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 10px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 5px; font-weight: 700; letter-spacing: 0.5px; }
    .btn-generate { background: var(--orange); color: white; border: none; border-radius: 11px;
      padding: 13px 26px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: background 0.2s, box-shadow 0.2s; }
    .btn-generate:hover { background: var(--orange-hover); box-shadow: 0 4px 18px var(--orange-glow); }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Alerts */
    .alert { padding: 11px 15px; border-radius: 9px; font-size: 13px; margin-top: 12px; display: none; }
    .alert.show { display: block; }
    .alert-error { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.3); color: #ff8080; }
    .alert-loading { background: rgba(242,101,34,0.08); border: 1px solid rgba(242,101,34,0.2); color: var(--muted); }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    .result-box { display: none; margin-top: 16px; animation: fadeUp 0.3s ease; }
    .result-box.show { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .result-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 7px; display: flex; align-items: center; gap: 8px; }
    .result-label a { color: var(--blue); text-decoration: none; font-size: 11px; letter-spacing: 0; }
    .url-row { display: flex; gap: 8px; align-items: center; background: var(--bg);
      border: 1px solid var(--border); border-radius: 9px; padding: 9px 13px; }
    .url-text { flex: 1; font-size: 13px; color: var(--text); font-family: monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .format-select { background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 5px 8px; border-radius: 7px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none; }
    .btn-copy { background: var(--blue); color: white; border: none; border-radius: 7px;
      padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
      font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
    .btn-copy:hover { opacity: 0.85; }
    .btn-copy.copied { background: var(--green); }

    /* Preview */
    .preview-section { display: none; }
    .preview-section.show { display: block; }
    .preview-header { display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .preview-title { font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 800; letter-spacing: -0.3px; }
    .sort-select { background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none; }

    /* Feed Items */
    .feed-item { padding: 18px 0; border-bottom: 1px solid var(--border); }
    .feed-item:last-child { border-bottom: none; }
    .feed-item-inner { display: flex; gap: 14px; align-items: flex-start; }
    .feed-item-text { flex: 1; min-width: 0; }
    .feed-item-title { font-size: 17px; font-weight: 600; line-height: 1.4; margin-bottom: 7px;
      color: var(--text); text-decoration: none; display: block; }
    .feed-item-title:hover { color: var(--orange); }
    .feed-item-desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 9px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .feed-item-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); }
    .feed-item-source { font-weight: 500; }
    .feed-item-actions { display: flex; gap: 5px; margin-left: auto; }
    .item-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; transition: color 0.15s; }
    .item-btn:hover { color: var(--text); }
    .feed-item-thumb { width: 76px; height: 56px; border-radius: 8px; object-fit: cover;
      flex-shrink: 0; border: 1px solid var(--border); }

    /* Skeleton */
    .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 5px; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .sk-item { padding: 18px 0; border-bottom: 1px solid var(--border); }
    .sk-t { height: 18px; width: 65%; margin-bottom: 9px; }
    .sk-d { height: 13px; width: 88%; margin-bottom: 5px; }
    .sk-d2 { height: 13px; width: 55%; margin-bottom: 9px; }
    .sk-m { height: 11px; width: 28%; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface);
      border: 1px solid var(--border); color: var(--text); padding: 11px 16px; border-radius: 10px;
      font-size: 14px; font-weight: 500; transform: translateY(50px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 1000; }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 720px) {
      .sidebar { display: none; }
      .content { padding: 16px; }
      header { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Feed<span>Forge</span></div>
  <div class="header-badge">RSS · JSON Feed Generator</div>
</header>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-label">My Feeds</div>
    <div id="sidebarFeeds"><div class="sidebar-empty">No feeds yet</div></div>
  </aside>

  <main class="content">

    <div class="gen-card">
      <div class="hero-mini">
        <h1>Generate an <em>RSS Feed</em></h1>
        <p>Enter any URL, news site, keyword or topic to get a live auto-updating feed</p>
      </div>
      <div class="input-row">
        <div class="input-wrap">
          <svg class="input-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="feedInput" placeholder="Enter URL, Topic or Keyword" autocomplete="off" />
          <span class="input-hint" id="inputHint">US</span>
        </div>
        <button class="btn-generate" id="generateBtn" onclick="generateFeed()">Generate</button>
      </div>
      <div class="alert alert-loading" id="loadingAlert"><span class="spinner"></span> Fetching and building your feed...</div>
      <div class="alert alert-error" id="errorAlert"></div>
      <div class="result-box" id="resultBox">
        <div class="result-label">
          Feed URL
          <a id="openLink" href="#" target="_blank">↗ Open</a>
        </div>
        <div class="url-row">
          <span class="url-text" id="resultUrl"></span>
          <select class="format-select" id="formatSelect" onchange="updateFormat()">
            <option value="xml">XML</option>
            <option value="json">JSON</option>
          </select>
          <button class="btn-copy" id="copyBtn" onclick="copyUrl()">Copy</button>
        </div>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-section" id="previewSection">
      <div class="preview-header">
        <div class="preview-title" id="previewTitle">Feed Preview</div>
        <select class="sort-select" id="sortSelect" onchange="sortItems()">
          <option value="auto">Sort: Auto</option>
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
      </div>
      <div id="feedItems"></div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = window.location.origin;
  let currentFeed = null, allItems = [], savedFeeds = [], activeFeedId = null;

  document.getElementById('feedInput').addEventListener('input', function() {
    const v = this.value.trim(), h = document.getElementById('inputHint');
    if (/^https?:\/\//i.test(v)||/^www\./i.test(v)) { h.textContent='URL'; h.style.color='#4a9eff'; }
    else if (v.length) { h.textContent='KEYWORD'; h.style.color='#f26522'; }
    else { h.textContent='US'; h.style.color=''; }
  });
  document.getElementById('feedInput').addEventListener('keydown', e => { if(e.key==='Enter') generateFeed(); });

  async function generateFeed() {
    const input = document.getElementById('feedInput').value.trim();
    if (!input) return;
    const btn=document.getElementById('generateBtn'), load=document.getElementById('loadingAlert'),
      err=document.getElementById('errorAlert'), res=document.getElementById('resultBox');
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Generating...';
    load.classList.add('show'); err.classList.remove('show'); res.classList.remove('show');
    document.getElementById('previewSection').classList.remove('show');
    try {
      const r = await fetch(`${API}/api/generate`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({input})});
      if (!r.ok) { const e=await r.json(); throw new Error(e.detail||'Failed'); }
      const data = await r.json();
      currentFeed = data;
      setResultUrl(data);
      res.classList.add('show');
      await loadFeeds();
      await loadPreview(data.feed_id);
      showToast('✨ Feed generated!');
    } catch(e) {
      err.textContent='⚠ '+e.message; err.classList.add('show');
    } finally {
      btn.disabled=false; btn.innerHTML='Generate'; load.classList.remove('show');
    }
  }

  function setResultUrl(data) {
    const fmt = document.getElementById('formatSelect').value;
    const url = `${API}${fmt==='xml'?data.xml_url:data.json_url}`;
    document.getElementById('resultUrl').textContent = url;
    document.getElementById('openLink').href = url;
  }

  function updateFormat() {
    if (currentFeed) { setResultUrl(currentFeed); document.getElementById('copyBtn').classList.remove('copied'); document.getElementById('copyBtn').textContent='Copy'; }
  }

  async function copyUrl() {
    await navigator.clipboard.writeText(document.getElementById('resultUrl').textContent);
    const b=document.getElementById('copyBtn'); b.textContent='Copied!'; b.classList.add('copied');
    setTimeout(()=>{b.textContent='Copy';b.classList.remove('copied');},2000);
    showToast('📋 Copied!');
  }

  async function loadPreview(feedId) {
    activeFeedId = feedId;
    const sec=document.getElementById('previewSection'), el=document.getElementById('feedItems');
    sec.classList.add('show');
    el.innerHTML = Array(6).fill(0).map(()=>`<div class="sk-item"><div class="skeleton sk-t"></div><div class="skeleton sk-d"></div><div class="skeleton sk-d2"></div><div class="skeleton sk-m"></div></div>`).join('');
    try {
      const r = await fetch(`${API}/api/feed/${feedId}/items`);
      const data = await r.json();
      allItems = data.items || [];
      document.getElementById('previewTitle').textContent = data.feed_title || 'Feed Preview';
      renderItems(allItems);
    } catch { el.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center">Failed to load items</div>'; }
  }

  function renderItems(items) {
    const el = document.getElementById('feedItems');
    if (!items.length) { el.innerHTML='<div style="padding:20px;color:var(--muted);text-align:center">No items found</div>'; return; }
    el.innerHTML = items.map(item => `
      <div class="feed-item">
        <div class="feed-item-inner">
          <div class="feed-item-text">
            <a class="feed-item-title" href="${esc(item.link)}" target="_blank" rel="noopener">${esc(item.title||'No title')}</a>
            ${item.description?`<div class="feed-item-desc">${esc(item.description)}</div>`:''}
            <div class="feed-item-meta">
              ${item.domain?`<span class="feed-item-source">${esc(item.domain)}</span>`:''}
              ${item.domain&&item.pub_date?`<span>·</span>`:''}
              ${item.pub_date?`<span>${fmtTime(item.pub_date)}</span>`:''}
              <div class="feed-item-actions">
                <button class="item-btn" onclick="event.stopPropagation();cpLink('${esc(item.link)}')" title="Copy link">⎘</button>
                <button class="item-btn" onclick="event.stopPropagation();window.open('${esc(item.link)}','_blank')" title="Open">↗</button>
              </div>
            </div>
          </div>
          ${item.image_url?`<img class="feed-item-thumb" src="${esc(item.image_url)}" alt="" loading="lazy" onerror="this.style.display='none'">`:''}
        </div>
      </div>`).join('');
  }

  function sortItems() {
    const s=document.getElementById('sortSelect').value, sorted=[...allItems];
    if(s==='newest') sorted.sort((a,b)=>new Date(b.pub_date)-new Date(a.pub_date));
    else if(s==='oldest') sorted.sort((a,b)=>new Date(a.pub_date)-new Date(b.pub_date));
    renderItems(sorted);
  }

  function fmtTime(d) {
    try {
      const diff=Math.floor((Date.now()-new Date(d))/1000);
      if(diff<60) return 'just now'; if(diff<3600) return Math.floor(diff/60)+'m';
      if(diff<86400) return Math.floor(diff/3600)+'h'; if(diff<604800) return Math.floor(diff/86400)+'d';
      return new Date(d).toLocaleDateString('en',{month:'short',day:'numeric'});
    } catch { return d; }
  }

  async function cpLink(url) { await navigator.clipboard.writeText(url); showToast('📋 Link copied!'); }

  async function loadFeeds() {
    try { const r=await fetch(`${API}/api/feeds`); savedFeeds=await r.json(); renderSidebar(); } catch{}
  }

  function renderSidebar() {
    const el=document.getElementById('sidebarFeeds');
    if (!savedFeeds.length) { el.innerHTML='<div class="sidebar-empty">No feeds yet</div>'; return; }
    el.innerHTML = savedFeeds.map(f=>`
      <div class="nav-item ${activeFeedId===f.id?'active':''}" onclick="selectFeed('${f.id}','${esc(f.xml_url)}','${esc(f.json_url)}')">
        <div class="nav-icon">${f.type==='url'?'🔗':'🔍'}</div>
        <div class="nav-info">
          <div class="nav-name">${esc(f.title||f.input)}</div>
          <div class="nav-count">${f.item_count} items</div>
        </div>
        <button class="nav-del" onclick="event.stopPropagation();delFeed('${f.id}')" title="Delete">✕</button>
      </div>`).join('');
  }

  async function selectFeed(id, xmlUrl, jsonUrl) {
    activeFeedId = id;
    const feed = savedFeeds.find(f=>f.id===id);
    if (feed) {
      currentFeed = {feed_id:id, xml_url:xmlUrl, json_url:jsonUrl};
      setResultUrl(currentFeed);
      document.getElementById('resultBox').classList.add('show');
    }
    renderSidebar();
    await loadPreview(id);
  }

  async function delFeed(id) {
    if (!confirm('Delete this feed?')) return;
    await fetch(`${API}/api/feeds/${id}`,{method:'DELETE'});
    if (activeFeedId===id) { document.getElementById('previewSection').classList.remove('show'); activeFeedId=null; }
    loadFeeds(); showToast('🗑 Feed deleted');
  }

  function showToast(msg) {
    const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  }

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

  loadFeeds();
</script>
</body>
</html>
